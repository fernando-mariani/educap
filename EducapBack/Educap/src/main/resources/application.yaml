spring:
  application:
    name: Educap
  profiles:
    active: default
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:54321/Educap}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true
logging:
  level:
    org:
      springframework:
        security: debug