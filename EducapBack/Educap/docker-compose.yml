version: '3.8'

services:
  postgres:
    image: postgres:16.3
    container_name: educapdb
    environment:
      POSTGRES_USER: educap
      POSTGRES_PASSWORD: educapdb
      POSTGRES_DB: educapdb
    ports:
      - "5432:5432"
    networks:
      - Educap-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: educapPgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: seu-email@email.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "15432:80"
    depends_on:
      - postgres
    networks:
      - Educap-network

  backend:
    image: fermedley/educapbackend
    container_name: EducapBackend
    ports:
      - "8080:8080"
    environment:
      DATASOURCE_URL: jdbc:postgresql://educapdb:5432/educapdb
      DATASOURCE_USERNAME: educap
      DATASOURCE_PASSWORD: educapdb
      TZ: America/Sao_Paulo
    depends_on:
      - postgres
    networks:
      - Educap-network

networks:
  Educap-network:
    driver: bridge